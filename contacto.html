<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solicitar Consultoría - FIFTH FIRM</title>
    <link href="https://fonts.googleapis.com/css2?family=Lora:wght@500&family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="estilo.css">
    
    <style>
        /* Estilos específicos para la distribución de pantalla dividida al 50% */
        .split-container {
            display: flex;
            align-items: stretch;
            width: 100%;
            max-width: 1100px; 
            margin: 40px auto; 
            background-color: #0c0c0c;
            border: 1px solid #222;
            border-radius: 4px;
            overflow: hidden;
        }

        /* Bloque izquierdo: Formulario */
        .form-side {
            flex: 1; 
            padding: 40px;
        }

        /* Bloque derecho: Imagen */
        .image-side {
            flex: 0.8; 
            position: relative;
            min-height: 450px;
        }

        .image-side img {
            width: 100%;
            height: 100%;
            object-fit: contain; 
            position: absolute;
            top: 0;
            left: 0;
            background-color: #0c0c0c; 
        }

        /* Diseño responsivo para pantallas táctiles o celulares */
        @media (max-width: 850px) {
            .split-container {
                flex-direction: column; 
            }
            .image-side {
                height: 300px;
                min-height: 300px;
            }
            .form-side {
                padding: 25px;
            }
        }
    </style>
</head>
<body>

    <header>
        <div class="nav-container">
            <a href="index.html" class="logo" style="text-decoration: none;">
                <span>&#9670;</span> FIFTH FIRM <small>Consultora</small>
            </a>
            
            <button class="menu-toggle" id="mobile-menu-btn" aria-label="Abrir menú">
                <span></span>
                <span></span>
                <span></span>
            </button>

            <nav class="nav-menu" id="nav-menu">
                <ul>
                    <li><a href="index.html">Inicio</a></li>
                    <li class="dropdown">
                        <a href="auditoria.html" class="dropdown-link">Auditoría</a>
                        <span class="arrow-btn" id="arrow-toggle">&#9662;</span>
                        <ul class="dropdown-menu" id="dropdown-sub">
        <li><a href="previo.html">Legajo Previo</a></li>
        <li><a href="permanente.html">Legajo Permanente</a></li>
        <li><a href="ejecucion.html">Legajo de Ejecución</a></li>
    </ul>
                    </li>
                    <li><a href="nosotros.html">Sobre Nosotros</a></li>
                    <li class="active"><a href="contacto.html">Contáctanos</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <section class="page-container" style="margin-top: 100px; width: 100%; display: flex; justify-content: center; padding: 20px 40px;">
        
        <div class="split-container">
            
            <div class="form-side">
                <h2 style="font-size: 2rem; margin-bottom: 10px;">Solicitud de Consultoría Financiera</h2>
                <p style="color: #cccccc; margin-bottom: 30px; font-size: 0.9rem;">Complete el siguiente formulario y un especialista se pondrá en contacto a la brevedad.</p>
                
                <form class="contact-form" style="border: none; padding: 0;" onsubmit="event.preventDefault(); alert('Solicitud enviada correctamente. Un consultor se comunicará con usted.');">
                    <div class="form-group">
                        <label>Nombre de la Entidad / Organización</label>
                        <input type="text" required placeholder="Ej. Ministerio u Empresa S.A.">
                    </div>
                    <div class="form-group">
                        <label>Nombre del Contacto Principal</label>
                        <input type="text" required>
                    </div>
                    <div class="form-group">
                        <label>Correo Electrónico Institucional</label>
                        <input type="email" required>
                    </div>
                    <div class="form-group">
                        <label>Tipo de Auditoría Requería</label>
                        <select required>
                            <option value="financiera">Auditoría Financiera Externa</option>
                            <option value="interna">Evaluación de Observaciones de UAI</option>
                            <option value="procesos">Auditoría de Procesos Internos</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Detalles Adicionales de la Solicitud</label>
                        <textarea rows="4" placeholder="Describa brevemente el alcance requerido..."></textarea>
                    </div>
                    <button type="submit" class="btn-action" style="width: 100%; border: none; cursor: pointer;">Enviar Solicitud Formal</button>
                </form>
            </div>

            <div class="image-side">
                <img src="cont.jfif" alt="Consultoría Técnica FIFTH FIRM">
            </div>

        </div>

    </section>

    <script>
        const mobileMenuBtn = document.getElementById('mobile-menu-btn');
        const navMenu = document.getElementById('nav-menu');
        const arrowToggle = document.getElementById('arrow-toggle');
        const dropdownSub = document.getElementById('dropdown-sub');

        mobileMenuBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            mobileMenuBtn.classList.toggle('active');
            navMenu.classList.toggle('open');
            
            if(!navMenu.classList.contains('open')) {
                dropdownSub.classList.remove('show');
                arrowToggle.classList.remove('rotated');
            }
        });

        arrowToggle.addEventListener('click', (e) => {
            e.preventDefault(); 
            e.stopPropagation();
            dropdownSub.classList.toggle('show');
            arrowToggle.classList.toggle('rotated');
        });

        document.addEventListener('click', (e) => {
            if (!navMenu.contains(e.target) && !mobileMenuBtn.contains(e.target)) {
                mobileMenuBtn.classList.remove('active');
                navMenu.classList.remove('open');
                dropdownSub.classList.remove('show');
                arrowToggle.classList.remove('rotated');
            }
        });
    </script>

</body>
</html>
